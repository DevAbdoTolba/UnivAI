services:
  db:
    image: pgvector/pgvector:pg16
    container_name: univai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: univai
      POSTGRES_PASSWORD: univai
      POSTGRES_DB: univai
    ports:
      # Host 5433, not 5432: another Postgres already owns 5432 on the dev machine.
      - "5433:5432"
    volumes:
      - univai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univai -d univai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The team's RAG service (UnivAI-Agent submodule) stores its vectors here.
  # This app never touches it — it only calls RAG's MCP server.
  qdrant:
    image: qdrant/qdrant
    container_name: univai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - univai-qdrant:/qdrant/storage

  # Local LiveKit server so the live lecture never depends on internet weather.
  # --dev bakes in the devkey/secret pair; --node-ip keeps ICE candidates on
  # localhost (for a two-machine LAN demo, set it to this machine's LAN IP).
  livekit:
    image: livekit/livekit-server:latest
    container_name: univai-livekit
    restart: unless-stopped
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7880:7880"       # signaling (ws / http)
      - "7881:7881"       # ICE over TCP
      - "7882:7882/udp"   # media (UDP mux)

  # Exam storage for the UnivAI-exam_system submodule (local for now).
  mongo:
    image: mongo:7
    container_name: univai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - univai-mongo:/data/db

volumes:
  univai-pgdata:
  univai-qdrant:
  univai-mongo:
